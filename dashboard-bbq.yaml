button_card_templates:
  inkbird_probe:
    show_name: false
    show_icon: false
    show_label: false
    tap_action:
      action: none
    styles:
      card:
      - padding: 18px
      - border-radius: 18px
      - border: 1px solid "#3a2f27"
      - border-top: "[[[\n  var s = states[variables.pstate].state;\n  var c = s==='ready' ? '#56c271' : s==='close' ? '#ff6a2c' : s==='heating' ? '#f2b441' : '#77695c';\n  return '3px solid ' + c;\n]]]\n"
      - background: linear-gradient(180deg,#211b16,#2b231d)
      - box-shadow: 0 18px 40px -18px rgba(0,0,0,.7)
      grid:
      - grid-template-areas: '"header header header header" "fig gauge side side" "fig gauge minus plus"'
      - grid-template-columns: 34px 128px 1fr 1fr
      - grid-template-rows: auto 1fr auto
      - gap: 10px 12px
      - align-items: center
      custom_fields:
        header:
        - justify-self: stretch
        fig:
        - align-self: stretch
        side:
        - justify-self: stretch
        minus:
        - justify-self: stretch
        plus:
        - justify-self: stretch
    custom_fields:
      header: "[[[\n  var s = states[variables.pstate].state;\n  var name = states[variables.pname].state;\n  var col = s==='ready' ? '#56c271' : s==='close' ? '#ff6a2c' : s==='heating' ? '#f2b441' : '#77695c';\n  var label = s==='ready' ? 'Ready' : s==='close' ? 'Almost there' : s==='heating' ? 'Heating' : 'Not connected';\n  return `<div style=\"display:flex;align-items:center;gap:11px;font-family:system-ui\">\n    <div style=\"width:30px;height:30px;border-radius:9px;display:grid;place-items:center;\n         font-family:ui-monospace,monospace;font-weight:700;background:#33291f;\n         border:1px solid #4d3f33;color:#f5ede4\">P${variables.num}</div>\n    <div style=\"flex:1;font-weight:620;font-size:1rem;color:#f5ede4\">${name}\n      <div style=\"font-size:.74rem;color:#a89a8c;font-weight:500\">Probe ${variables.num}</div></div>\n    <div style=\"font-size:.72rem;font-weight:600;letter-spacing:.04em;text-transform:uppercase;\n         padding:5px 11px;border-radius:999px;color:${col};\n\
        \         background:${col}26;border:1px solid ${col}66\">${label}</div>\n  </div>`;\n]]]\n"
      fig: "[[[\n  var s = states[variables.pstate].state;\n  var connected = s !== 'idle';\n  var col = s==='ready' ? '#56c271' : s==='close' ? '#ff6a2c' : s==='heating' ? '#f2b441' : '#77695c';\n  var tip = connected ? col : '#77695c';\n  var glow = connected ? `filter:drop-shadow(0 0 4px ${col})` : '';\n  return `<svg viewBox=\"0 0 26 150\" style=\"height:148px;width:auto;display:block;margin:auto\">\n    <defs>\n      <linearGradient id=\"st${variables.num}\" x1=\"0\" x2=\"1\" y1=\"0\" y2=\"0\">\n        <stop offset=\"0\" stop-color=\"#6c7075\"/><stop offset=\".28\" stop-color=\"#eef1f3\"/>\n        <stop offset=\".5\" stop-color=\"#c4c9ce\"/><stop offset=\".72\" stop-color=\"#eef1f3\"/>\n        <stop offset=\"1\" stop-color=\"#5c6065\"/></linearGradient>\n      <linearGradient id=\"gl${variables.num}\" x1=\"0\" x2=\"1\" y1=\"0\" y2=\"0\">\n        <stop offset=\"0\" stop-color=\"#0c0c0e\"/><stop offset=\".3\" stop-color=\"#3a3a40\"/>\n        <stop offset=\".5\" stop-color=\"#141418\"\
        /><stop offset=\".75\" stop-color=\"#2a2a30\"/>\n        <stop offset=\"1\" stop-color=\"#050506\"/></linearGradient>\n      <linearGradient id=\"rg${variables.num}\" x1=\"0\" x2=\"1\" y1=\"0\" y2=\"0\">\n        <stop offset=\"0\" stop-color=\"#8a8e93\"/><stop offset=\".5\" stop-color=\"#f2f4f6\"/>\n        <stop offset=\"1\" stop-color=\"#7a7e83\"/></linearGradient>\n    </defs>\n    <ellipse cx=\"13\" cy=\"6\" rx=\"7.5\" ry=\"2.6\" fill=\"url(#rg${variables.num})\"/>\n    <path d=\"M5.5 6 L20.5 6 L17 52 L9 52 Z\" fill=\"url(#gl${variables.num})\" stroke=\"#000\" stroke-width=\".6\"/>\n    <text x=\"13\" y=\"30\" text-anchor=\"middle\" font-family=\"ui-monospace,monospace\"\n          font-weight=\"700\" font-size=\"10\" fill=\"${connected?'#f0f0f2':'#8a8a8c'}\">${variables.num}</text>\n    <rect x=\"8.5\" y=\"52\" width=\"9\" height=\"4\" rx=\"1\" fill=\"url(#rg${variables.num})\"/>\n    <rect x=\"10\" y=\"56\" width=\"6\" height=\"82\" fill=\"url(#st${variables.num})\"/>\n  \
        \  <path d=\"M10 138 L16 138 L13 150 Z\" fill=\"${tip}\" style=\"${glow}\"/>\n  </svg>`;\n]]]\n"
      gauge: "[[[\n  var t = parseFloat(states[variables.probe].state);\n  var g = parseFloat(states[variables.target].state);\n  var s = states[variables.pstate].state;\n  var amb = 22, connected = !isNaN(t);\n  var col = s==='ready' ? '#56c271' : s==='close' ? '#ff6a2c' : s==='heating' ? '#f2b441' : '#77695c';\n  var pct = connected ? Math.max(0, Math.min(1,(t-amb)/(g-amb))) : 0;\n  var R=52, C=2*Math.PI*R, ARC=0.75;\n  var dash=(C*ARC*pct).toFixed(1)+' '+C;\n  var uf = states['input_select.inkbird_unit'].state.indexOf('F') >= 0;\n  var us = uf ? '°F' : '°C';\n  var cv = function(c){ return uf ? Math.round(c*9/5+32) : Math.round(c*10)/10; };\n  var temp = connected ? cv(t) : '—';\n  return `<div style=\"position:relative;width:128px;height:128px;margin:auto\">\n    <svg width=\"128\" height=\"128\" viewBox=\"0 0 128 128\" style=\"transform:rotate(135deg)\">\n      <circle cx=\"64\" cy=\"64\" r=\"${R}\" fill=\"none\" stroke=\"#33291f\" stroke-width=\"9\"\n        stroke-linecap=\"round\"\
        \ stroke-dasharray=\"${(C*ARC).toFixed(1)} ${C}\"/>\n      <circle cx=\"64\" cy=\"64\" r=\"${R}\" fill=\"none\" stroke=\"${col}\" stroke-width=\"9\"\n        stroke-linecap=\"round\" stroke-dasharray=\"${dash}\"\n        style=\"transition:stroke-dasharray .6s ease,stroke .4s\"/>\n    </svg>\n    <div style=\"position:absolute;inset:0;display:flex;flex-direction:column;\n         align-items:center;justify-content:center;font-family:ui-monospace,monospace\">\n      <div style=\"font-size:1.7rem;font-weight:650;color:#f5ede4;line-height:1\">${temp}<span style=\"font-size:.9rem;color:#a89a8c\">${us}</span></div>\n      <div style=\"font-size:.72rem;color:#77695c;margin-top:2px\">${connected?'target '+cv(g)+'°':'no probe'}</div>\n    </div>\n  </div>`;\n]]]\n"
      side: "[[[\n  var t = parseFloat(states[variables.probe].state);\n  var g = parseFloat(states[variables.target].state);\n  var s = states[variables.pstate].state;\n  var connected = !isNaN(t);\n  var uf = states['input_select.inkbird_unit'].state.indexOf('F') >= 0;\n  var us = uf ? '°F' : '°C';\n  var cv = function(c){ return uf ? Math.round(c*9/5+32) : Math.round(c*10)/10; };\n  var togo = uf ? Math.round((g-t)*9/5) : Math.round((g-t)*10)/10;\n  var footer = !connected ? 'Insert a probe to begin'\n    : (s==='ready' ? 'Reached target — resting'\n    : Math.max(0, togo) + '° to go');\n  return `<div style=\"display:flex;flex-direction:column;gap:12px;font-family:system-ui\">\n    <div style=\"display:flex;align-items:center;gap:10px\">\n      <span style=\"flex:1;font-size:.72rem;text-transform:uppercase;letter-spacing:.12em;color:#77695c\">Target</span>\n      <span style=\"font-family:ui-monospace,monospace;font-weight:600;font-size:1.05rem;color:#f5ede4\">${cv(g)}${us}</span>\n\
        \    </div>\n    <div style=\"font-size:.78rem;color:#a89a8c\">${footer}</div>\n  </div>`;\n]]]\n"
      minus:
        card:
          type: custom:button-card
          name: −
          tap_action:
            action: call-service
            service: input_number.decrement
            target:
              entity_id: '[[[ return variables.target ]]]'
          styles:
            card:
            - height: 40px
            - border-radius: 10px
            - border: 1px solid "#4d3f33"
            - background: '#33291f'
            - color: '#f5ede4'
            - font-size: 1.3rem
      plus:
        card:
          type: custom:button-card
          name: +
          tap_action:
            action: call-service
            service: input_number.increment
            target:
              entity_id: '[[[ return variables.target ]]]'
          styles:
            card:
            - height: 40px
            - border-radius: 10px
            - border: 1px solid "#4d3f33"
            - background: '#33291f'
            - color: '#ff6a2c'
            - font-size: 1.3rem
  inkbird_recipe:
    show_icon: true
    icon: mdi:silverware-fork-knife
    styles:
      card:
      - padding: 14px
      - border-radius: 14px
      - border: 1px solid "#3a2f27"
      - background: '#211b16'
      grid:
      - grid-template-areas: '"i" "n" "t" "s"'
      - grid-template-rows: auto auto auto auto
      - gap: 6px
      - justify-items: start
      icon:
      - color: '[[[ return variables.color ]]]'
      - width: 30px
      name:
      - color: '#f5ede4'
      - font-weight: 620
      - font-size: .92rem
      - justify-self: start
      custom_fields:
        t:
        - justify-self: start
        s:
        - justify-self: start
    custom_fields:
      t: '[[[ return `<div style="font-family:ui-monospace,monospace;font-weight:650;font-size:1.15rem;color:#ff6a2c">${variables.temp}<span style="font-size:.74rem;color:#a89a8c">°C</span></div>`; ]]]

        '
      s: '[[[ return `<div style="font-size:.74rem;color:#a89a8c">${variables.note}</div>`; ]]]

        '
    tap_action:
      action: call-service
      service: script.inkbird_apply_recipe
      data:
        label: '[[[ return variables.rname ]]]'
        target: '[[[ return variables.temp ]]]'
title: Cook Control
views:
- title: Cook Control
  path: cook
  icon: mdi:grill
  background: '#16120f'
  cards:
  - type: vertical-stack
    card_mod:
      style: ':host { max-width: 1220px; margin: 0 auto; display:block; }

        '
    cards:
    - type: custom:button-card
      tap_action:
        action: none
      styles:
        card:
        - background: none
        - border: none
        - box-shadow: none
        - padding: 6px 6px 0
        grid:
        - grid-template-areas: '"mark title status"'
        - grid-template-columns: auto 1fr auto
        - align-items: center
        - gap: 14px
        custom_fields:
          title:
          - justify-self: start
          status:
          - justify-self: end
      custom_fields:
        mark: "[[[ return `<div style=\"width:46px;height:46px;border-radius:13px;\n  display:grid;place-items:center;\n  background:linear-gradient(150deg,#ff8a3d,#ff6a2c);\n  box-shadow:0 6px 18px -6px #ff6a2c,inset 0 1px 0 rgba(255,255,255,.35)\">\n  <svg width=\"26\" height=\"26\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\"\n    stroke-width=\"2.1\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n    <path d=\"M12 3c1.5 2.5.5 4-.7 5.4C10 10 9 11.4 9 13.2A3 3 0 0 0 15 13.2c0-1.2-.5-2-1-2.8\"/>\n    <path d=\"M12 21a5 5 0 0 0 5-5c0-1.6-.7-2.7-1.5-3.7\"/></svg></div>`; ]]]\n"
        title: "[[[ return `<div style=\"font-family:system-ui;text-align:left\">\n  <div style=\"font-size:1.16rem;font-weight:650;color:#f5ede4;letter-spacing:-.01em\">Cook Control</div>\n  <div style=\"font-size:.74rem;color:#a89a8c;letter-spacing:.14em;text-transform:uppercase\">Inkbird INT-14 (INT-14S-BW)</div>\n</div>`; ]]]\n"
        status: "[[[\n  var b = states['sensor.overig_inkbird_int_14_base_battery'].state;\n  b = (b === undefined || b === 'unknown' || b === 'unavailable') ? '—' : b + '%';\n  return `<div style=\"display:flex;gap:10px;align-items:center;font-family:system-ui\">\n    <span style=\"display:inline-flex;align-items:center;gap:8px;background:#211b16;\n      border:1px solid #3a2f27;padding:8px 13px;border-radius:999px;font-size:.82rem;color:#a89a8c\">\n      <span style=\"width:8px;height:8px;border-radius:50%;background:#56c271\"></span>\n      Live · <b style=\"color:#f5ede4\">via Bluetooth</b></span>\n    <span style=\"background:#211b16;border:1px solid #3a2f27;padding:8px 13px;\n      border-radius:999px;font-size:.82rem;color:#a89a8c\">Base battery\n      <b style=\"color:#f5ede4\">${b}</b></span>\n  </div>`;\n]]]\n"
    - type: markdown
      content: "{% set ns = namespace(rows=[]) %}\n{% for i in range(1,5) %}\n  {% set s = states('sensor.bbq_probe_' ~ i ~ '_status') %}\n  {% set n = states('input_text.inkbird_name_' ~ i) %}\n  {% set g = states('input_number.inkbird_target_' ~ i) | int %}\n  {% if s == 'ready' %}\n    {% set ns.rows = ns.rows + ['\U0001F7E2 **' ~ n ~ '** reached ' ~ g ~ '°C — ready'] %}\n  {% elif s == 'close' %}\n    {% set ns.rows = ns.rows + ['\U0001F7E1 **' ~ n ~ '** almost there (target ' ~ g ~ '°C)'] %}\n  {% endif %}\n{% endfor %}\n### Alerts\n{% if ns.rows | length == 0 %}\n_No alerts. Everything's on track._\n{% else %}\n{% for r in ns.rows %}- {{ r }}\n{% endfor %}\n{% endif %}\n"
      card_mod:
        style: "ha-card {\n  background: linear-gradient(180deg,#211b16,#2b231d);\n  border:1px solid #3a2f27; border-radius:18px; color:#f5ede4;\n}\n"
    - type: custom:button-card
      icon: mdi:cog-outline
      show_name: true
      show_icon: true
      name: Settings
      size: 22px
      styles:
        card:
        - background: '#211b16'
        - border: '1px solid #3a2f27'
        - border-radius: 14px
        - padding: 10px 16px
        - justify-self: end
        - width: 150px
        name:
        - font-size: .82rem
        - color: '#a89a8c'
        icon:
        - color: '#a89a8c'
      tap_action:
        action: navigate
        navigation_path: /dashboard-bbq/settings
    - type: custom:button-card
      tap_action:
        action: none
      styles:
        card:
        - background: linear-gradient(180deg,#211b16,#2b231d)
        - border: 1px solid "#3a2f27"
        - border-radius: 18px
        - padding: 20px 24px
        - box-shadow: 0 18px 40px -18px rgba(0,0,0,.7)
        grid:
        - grid-template-areas: '"dev meta batt"'
        - grid-template-columns: auto 1fr auto
        - align-items: center
        - gap: 26px
        custom_fields:
          meta:
          - justify-self: start
      custom_fields:
        dev: "[[[ return `<svg width=\"172\" height=\"158\" viewBox=\"0 0 172 158\" fill=\"none\">\n  <rect x=\"3\" y=\"3\" width=\"166\" height=\"152\" rx=\"24\" fill=\"#0b0b0d\" stroke=\"#c9cdd2\" stroke-width=\"3\"/>\n  <rect x=\"9\" y=\"9\" width=\"154\" height=\"140\" rx=\"19\" fill=\"#141416\" stroke=\"#2a2a2e\"/>\n  <rect x=\"18\" y=\"20\" width=\"66\" height=\"104\" rx=\"11\" fill=\"#0a0a0c\" stroke=\"#242428\"/>\n  <g stroke=\"#c4c9ce\" stroke-width=\"3\">\n    <line x1=\"30\" y1=\"30\" x2=\"30\" y2=\"118\"/><line x1=\"44\" y1=\"30\" x2=\"44\" y2=\"118\"/>\n    <line x1=\"58\" y1=\"30\" x2=\"58\" y2=\"118\"/><line x1=\"72\" y1=\"30\" x2=\"72\" y2=\"118\"/></g>\n  <g font-family=\"ui-monospace,monospace\" font-size=\"7\" fill=\"#e8e8ea\" text-anchor=\"middle\">\n    <text x=\"30\" y=\"40\">1</text><text x=\"44\" y=\"40\">2</text><text x=\"58\" y=\"40\">3</text><text x=\"72\" y=\"40\">4</text></g>\n  <rect x=\"92\" y=\"20\" width=\"62\" height=\"94\" rx=\"10\" fill=\"#050506\" stroke=\"\
          #242428\"/>\n  <g font-family=\"ui-monospace,monospace\" font-weight=\"700\" fill=\"#f4f4f6\">\n    <text x=\"98\" y=\"46\" font-size=\"12\">63</text><text x=\"98\" y=\"63\" font-size=\"12\">57</text>\n    <text x=\"98\" y=\"80\" font-size=\"12\">41</text><text x=\"98\" y=\"97\" font-size=\"11\" fill=\"#55555a\">---</text></g>\n  <text x=\"123\" y=\"128\" font-family=\"system-ui\" font-weight=\"700\" font-size=\"9\" fill=\"#c9cdd2\" text-anchor=\"middle\" letter-spacing=\"1.5\">INKBIRD</text>\n  <circle cx=\"63\" cy=\"136\" r=\"10\" fill=\"#0a0a0c\" stroke=\"#c9cdd2\" stroke-width=\"1.5\"/>\n  <circle cx=\"63\" cy=\"136\" r=\"6\" fill=\"#1a1a1e\"/></svg>`; ]]]\n"
        meta: "[[[\n  var b = states['sensor.overig_inkbird_int_14_base_battery'].state;\n  b = (b === undefined || b === 'unknown' || b === 'unavailable') ? '—' : b + '%';\n  return `<div style=\"font-family:system-ui\">\n    <div style=\"font-size:.72rem;text-transform:uppercase;letter-spacing:.16em;color:#77695c\">Base station</div>\n    <div style=\"font-size:1.28rem;font-weight:650;color:#f5ede4;margin:2px 0 10px\">INT-14S-BW</div>\n    <div style=\"display:flex;gap:26px\">\n      <div><div style=\"font-size:.72rem;text-transform:uppercase;letter-spacing:.12em;color:#77695c\">Connection</div>\n        <div style=\"font-family:ui-monospace,monospace;font-size:1.05rem;font-weight:600;color:#f5ede4\">BLE 5.4</div></div>\n      <div><div style=\"font-size:.72rem;text-transform:uppercase;letter-spacing:.12em;color:#77695c\">Battery</div>\n        <div style=\"font-family:ui-monospace,monospace;font-size:1.05rem;font-weight:600;color:#f5ede4\">${b}</div></div>\n    </div></div>`;\n]]]\n"
        batt: "[[[\n  var raw = parseInt(states['sensor.overig_inkbird_int_14_base_battery'].state);\n  var pct = isNaN(raw) ? 0 : raw;\n  var col = pct < 20 ? '#e8503a' : '#56c271';\n  return `<div style=\"display:flex;align-items:center;gap:9px\">\n    <div style=\"width:40px;height:18px;border:2px solid #a89a8c;border-radius:4px;padding:2px;position:relative\">\n      <div style=\"height:100%;width:${pct}%;background:${col};border-radius:1px\"></div></div>\n    <span style=\"font-family:ui-monospace,monospace;font-weight:600;color:#f5ede4\">${isNaN(raw)?'—':pct+'%'}</span>\n  </div>`;\n]]]\n"
    - type: grid
      columns: 2
      square: false
      cards:
      - type: custom:button-card
        template: inkbird_probe
        variables:
          num: 1
          probe: sensor.overig_inkbird_int_14_probe_1_food_1_temperature
          target: input_number.inkbird_target_1
          pname: input_text.inkbird_name_1
          pstate: sensor.bbq_probe_1_status
      - type: custom:button-card
        template: inkbird_probe
        variables:
          num: 2
          probe: sensor.overig_inkbird_int_14_probe_2_food_1_temperature
          target: input_number.inkbird_target_2
          pname: input_text.inkbird_name_2
          pstate: sensor.bbq_probe_2_status
      - type: custom:button-card
        template: inkbird_probe
        variables:
          num: 3
          probe: sensor.overig_inkbird_int_14_probe_3_food_1_temperature
          target: input_number.inkbird_target_3
          pname: input_text.inkbird_name_3
          pstate: sensor.bbq_probe_3_status
      - type: custom:button-card
        template: inkbird_probe
        variables:
          num: 4
          probe: sensor.overig_inkbird_int_14_probe_4_food_1_temperature
          target: input_number.inkbird_target_4
          pname: input_text.inkbird_name_4
          pstate: sensor.bbq_probe_4_status
    - type: markdown
      content: '#### Recipe presets — first pick the **Active probe** above, then tap a recipe

        '
      card_mod:
        style: 'ha-card { background:none;border:none;box-shadow:none;color:#a89a8c; }

          '
    - type: grid
      columns: 6
      square: false
      cards:
      - type: tile
        entity: input_select.inkbird_active_probe
        name: Active probe
        icon: mdi:thermometer-lines
        features:
        - type: select-options
      - type: custom:button-card
        template: inkbird_recipe
        name: Beef Brisket
        variables:
          rname: Beef Brisket
          temp: 93
          note: Low & slow
          color: '#b0442a'
      - type: custom:button-card
        template: inkbird_recipe
        name: Chicken
        variables:
          rname: Chicken
          temp: 74
          note: Food-safe
          color: '#e0a23a'
      - type: custom:button-card
        template: inkbird_recipe
        name: Medium Steak
        variables:
          rname: Medium Steak
          temp: 57
          note: Pull temp
          color: '#c25a3c'
      - type: custom:button-card
        template: inkbird_recipe
        name: Pork Ribs
        variables:
          rname: Pork Ribs
          temp: 90
          note: Fall-off
          color: '#a9563b'
      - type: custom:button-card
        template: inkbird_recipe
        name: Salmon
        variables:
          rname: Salmon
          temp: 52
          note: Just flaky
          color: '#e07a52'
  panel: true
- title: Settings
  path: settings
  icon: mdi:cog
  subview: true
  background: '#16120f'
  cards:
  - type: vertical-stack
    card_mod:
      style: ':host { max-width: 900px; margin: 0 auto; display:block; }

        '
    cards:
    - type: custom:button-card
      icon: mdi:arrow-left
      show_name: true
      show_icon: true
      name: Cook Control
      styles:
        card:
        - background: '#211b16'
        - border: '1px solid #3a2f27'
        - border-radius: 14px
        - padding: 10px 16px
        - justify-self: start
        - width: 170px
        name:
        - font-size: .82rem
        - color: '#a89a8c'
        icon:
        - color: '#a89a8c'
      tap_action:
        action: navigate
        navigation_path: /dashboard-bbq/cook
    - type: markdown
      content: '## ⚙️ BBQ Settings

        Beheer thema, notificaties, eenheden en links voor het Inkbird BBQ-dashboard.

        '
      card_mod:
        style: 'ha-card { background:none;border:none;box-shadow:none;color:#f5ede4; }

          '
    - type: tile
      entity: update.inkbird_int_update
      name: Integratie versie
      icon: mdi:update
      features:
      - type: update-actions
    - type: grid
      columns: 3
      square: false
      cards:
      - type: tile
        entity: input_select.inkbird_unit
        name: Temperature unit
        icon: mdi:thermometer
        features:
        - type: select-options
      - type: tile
        entity: input_select.bbq_thema
        name: Thema
        icon: mdi:palette
        features:
        - type: select-options
      - type: tile
        entity: input_select.bbq_notificatie_apparaat
        name: Notificatie-apparaat
        icon: mdi:bell-ring
        features:
