# ============================================================================
#  Inkbird BBQ Dashboard — Home Assistant package
# ----------------------------------------------------------------------------
#  Everything the dashboard needs, in one file: helpers, template sensors,
#  rate sensors, the notification router, and the alert automations.
#
#  Install:
#    1. Copy this file to  <config>/packages/inkbird_bbq.yaml
#    2. Make sure configuration.yaml contains:
#
#         homeassistant:
#           packages: !include_dir_named packages
#
#    3. Developer Tools -> YAML -> check configuration, then restart HA.
#
#  ---------------------------------------------------------------------------
#  POINTING THIS AT YOUR OWN SENSORS
#
#  Most of it follows `input_text.inkbird_sensor_prefix`, which you set on the
#  dashboard's Settings page — no file editing, no restart. That covers the
#  four probe cards, the status sensors and every automation.
#
#  Two things CANNOT read a helper at runtime, because Home Assistant resolves
#  them when the config loads rather than when they render:
#
#    * the `derivative` sensors below — `source:` must be a literal entity id
#    * the Probes page — native picture-elements / tile / history-graph cards
#      take a literal `entity:`
#
#  For those, run the script once (it also updates the prefix default here):
#
#      python3 scripts/configure.py --prefix sensor.your_inkbird_prefix
#
#  ---------------------------------------------------------------------------
#  First run: `initial:` is deliberately not used anywhere — it would reset
#  your settings on every restart. The cost is that the alert toggles start
#  off and the numbers start at their minimum. Open Settings once and set them.
# ============================================================================

input_text:
  # The area-prefixed base of your Inkbird sensors, without a trailing
  # underscore, e.g. sensor.kitchen_inkbird_int_14
  inkbird_sensor_prefix:
    name: Inkbird sensor prefix
    icon: mdi:identifier
    max: 120

  inkbird_name_1:
    name: Probe 1 name
    max: 100
  inkbird_name_2:
    name: Probe 2 name
    max: 100
  inkbird_name_3:
    name: Probe 3 name
    max: 100
  inkbird_name_4:
    name: Probe 4 name
    max: 100

  # Leave either of these empty to disable spoken announcements entirely.
  bbq_tts_speaker:
    name: BBQ TTS speaker
    icon: mdi:speaker
    max: 120
  bbq_tts_engine:
    name: BBQ TTS engine
    icon: mdi:text-to-speech
    max: 120

input_number:
  inkbird_target_1:
    name: Probe 1 target
    icon: mdi:thermometer-alert
    min: 0
    max: 300
    step: 1
    unit_of_measurement: "°C"
    mode: slider
  inkbird_target_2:
    name: Probe 2 target
    icon: mdi:thermometer-alert
    min: 0
    max: 300
    step: 1
    unit_of_measurement: "°C"
    mode: slider
  inkbird_target_3:
    name: Probe 3 target
    icon: mdi:thermometer-alert
    min: 0
    max: 300
    step: 1
    unit_of_measurement: "°C"
    mode: slider
  inkbird_target_4:
    name: Probe 4 target
    icon: mdi:thermometer-alert
    min: 0
    max: 300
    step: 1
    unit_of_measurement: "°C"
    mode: slider

  bbq_battery_threshold:
    name: BBQ battery alert threshold
    icon: mdi:battery-alert-variant-outline
    min: 5
    max: 50
    step: 1
    unit_of_measurement: "%"
    mode: slider

  # Minimum is 5 rather than 1 so a fresh install has a usable default
  # without needing `initial:`.
  bbq_snooze_minutes:
    name: BBQ snooze duration
    icon: mdi:alarm-snooze
    min: 5
    max: 60
    step: 5
    unit_of_measurement: min
    mode: slider

input_boolean:
  bbq_battery_alerts:
    name: BBQ battery alerts
    icon: mdi:battery-alert
  bbq_stall_alerts:
    name: BBQ stall alerts
    icon: mdi:trending-neutral
  bbq_tts_alerts:
    name: BBQ spoken announcements
    icon: mdi:bullhorn

input_select:
  inkbird_active_probe:
    name: Active probe
    icon: mdi:target
    options: ["1", "2", "3", "4"]

  inkbird_unit:
    name: Temperature unit
    icon: mdi:thermometer
    options: ["°C", "°F"]

  # Options MUST match notify.* services on your instance, minus the `notify.`
  # prefix. Keep them in sync with the `choose` block in script.bbq_notify.
  bbq_notify_target:
    name: BBQ notification target
    icon: mdi:bell-ring
    options:
      - persistent_notification
      # - mobile_app_your_phone
      # - notify_pushover

# ----------------------------------------------------------------------------
#  Rate of change, in °C per hour. Drives the ETA on the probe cards and the
#  stall detection below.
#
#  `source:` is the one place that cannot follow the prefix helper — the
#  derivative integration resolves it at config load. scripts/configure.py
#  rewrites these four lines.
#
#  `time_window` smooths probe jitter; without it the ETA jumps around.
#  `max_sub_interval` forces a recalculation even when the source sensor goes
#  quiet, so a disconnected or genuinely stalled probe decays towards 0 instead
#  of freezing at its last value — stall detection depends on that.
# ----------------------------------------------------------------------------
sensor:
  - platform: derivative
    name: BBQ Probe 1 Rate
    unique_id: bbq_probe_1_rate
    source: sensor.overig_inkbird_int_14_probe_1_food_1_temperature
    unit_time: h
    time_window: "00:10:00"
    max_sub_interval: "00:02:00"
    round: 1
  - platform: derivative
    name: BBQ Probe 2 Rate
    unique_id: bbq_probe_2_rate
    source: sensor.overig_inkbird_int_14_probe_2_food_1_temperature
    unit_time: h
    time_window: "00:10:00"
    max_sub_interval: "00:02:00"
    round: 1
  - platform: derivative
    name: BBQ Probe 3 Rate
    unique_id: bbq_probe_3_rate
    source: sensor.overig_inkbird_int_14_probe_3_food_1_temperature
    unit_time: h
    time_window: "00:10:00"
    max_sub_interval: "00:02:00"
    round: 1
  - platform: derivative
    name: BBQ Probe 4 Rate
    unique_id: bbq_probe_4_rate
    source: sensor.overig_inkbird_int_14_probe_4_food_1_temperature
    unit_time: h
    time_window: "00:10:00"
    max_sub_interval: "00:02:00"
    round: 1

# ----------------------------------------------------------------------------
#  Per-probe status: idle / heating / close / ready
#  "close" kicks in within 5 °C of the target.
#
#  These build the sensor id from the prefix helper at render time, so changing
#  the helper on the Settings page re-points them immediately.
# ----------------------------------------------------------------------------
template:
  - sensor:
      - name: BBQ Probe 1 Status
        unique_id: bbq_probe_1_status
        state: >
          {% set p = states('input_text.inkbird_sensor_prefix') %}
          {% set p = p if p not in ['unknown', 'unavailable', ''] else 'sensor.overig_inkbird_int_14' %}
          {% set t = states(p ~ '_probe_1_food_1_temperature') | float(none) %}
          {% set g = states('input_number.inkbird_target_1') | float(none) %}
          {% if t is none or g is none %} idle
          {% elif t >= g %} ready
          {% elif t >= g - 5 %} close
          {% else %} heating
          {% endif %}

      - name: BBQ Probe 2 Status
        unique_id: bbq_probe_2_status
        state: >
          {% set p = states('input_text.inkbird_sensor_prefix') %}
          {% set p = p if p not in ['unknown', 'unavailable', ''] else 'sensor.overig_inkbird_int_14' %}
          {% set t = states(p ~ '_probe_2_food_1_temperature') | float(none) %}
          {% set g = states('input_number.inkbird_target_2') | float(none) %}
          {% if t is none or g is none %} idle
          {% elif t >= g %} ready
          {% elif t >= g - 5 %} close
          {% else %} heating
          {% endif %}

      - name: BBQ Probe 3 Status
        unique_id: bbq_probe_3_status
        state: >
          {% set p = states('input_text.inkbird_sensor_prefix') %}
          {% set p = p if p not in ['unknown', 'unavailable', ''] else 'sensor.overig_inkbird_int_14' %}
          {% set t = states(p ~ '_probe_3_food_1_temperature') | float(none) %}
          {% set g = states('input_number.inkbird_target_3') | float(none) %}
          {% if t is none or g is none %} idle
          {% elif t >= g %} ready
          {% elif t >= g - 5 %} close
          {% else %} heating
          {% endif %}

      - name: BBQ Probe 4 Status
        unique_id: bbq_probe_4_status
        state: >
          {% set p = states('input_text.inkbird_sensor_prefix') %}
          {% set p = p if p not in ['unknown', 'unavailable', ''] else 'sensor.overig_inkbird_int_14' %}
          {% set t = states(p ~ '_probe_4_food_1_temperature') | float(none) %}
          {% set g = states('input_number.inkbird_target_4') | float(none) %}
          {% if t is none or g is none %} idle
          {% elif t >= g %} ready
          {% elif t >= g - 5 %} close
          {% else %} heating
          {% endif %}

script:
  # --------------------------------------------------------------------------
  #  Recipe presets — writes name + target onto whichever probe is "active".
  # --------------------------------------------------------------------------
  inkbird_apply_recipe:
    alias: Inkbird — apply recipe to active probe
    icon: mdi:silverware-fork-knife
    mode: parallel
    max: 10
    fields:
      label:
        name: Label
        description: Display name written to the probe (e.g. "Beef Brisket").
        required: true
        selector:
          text:
      target:
        name: Target
        description: Target temperature in °C.
        required: true
        selector:
          number:
            min: 0
            max: 300
            unit_of_measurement: "°C"
    sequence:
      - variables:
          probe: "{{ states('input_select.inkbird_active_probe') }}"
      - action: input_number.set_value
        target:
          entity_id: "input_number.inkbird_target_{{ probe }}"
        data:
          value: "{{ target | float }}"
      - action: input_text.set_value
        target:
          entity_id: "input_text.inkbird_name_{{ probe }}"
        data:
          value: "{{ label }}"

  # --------------------------------------------------------------------------
  #  One notification router for every alert in this package: persistent
  #  notification, optional push, optional spoken announcement.
  #
  #  Every automation calls this instead of carrying its own copy — add a phone
  #  or a speaker once here and all three alerts use it.
  #
  #  notify service names are written out literally on purpose: Home Assistant
  #  validates a literal `action:` when the config loads, a templated one only
  #  when it runs — and "my brisket is done" is a bad moment to find a typo.
  # --------------------------------------------------------------------------
  bbq_notify:
    alias: BBQ — send a notification
    icon: mdi:bell-ring-outline
    mode: parallel
    max: 25
    fields:
      title:
        name: Title
        required: true
        selector:
          text:
      message:
        name: Message
        required: true
        selector:
          text:
      tag:
        name: Tag
        description: >
          Notification id. Re-using a tag replaces the previous notification
          instead of stacking another one up.
        required: true
        selector:
          text:
      actions:
        name: Actions
        description: Optional mobile_app action buttons.
        required: false
        selector:
          object:
      tts_message:
        name: Spoken message
        description: >
          What the speaker says. Falls back to `message`. Worth setting
          separately — emoji and "°C" do not read well out loud.
        required: false
        selector:
          text:
    sequence:
      - action: persistent_notification.create
        data:
          title: "{{ title }}"
          message: "{{ message }}"
          notification_id: "{{ tag }}"

      # Replace [] with one branch per notify service, e.g.:
      #
      #   - conditions:
      #       - condition: state
      #         entity_id: input_select.bbq_notify_target
      #         state: mobile_app_your_phone
      #     sequence:
      #       - action: notify.mobile_app_your_phone
      #         data:
      #           title: "{{ title }}"
      #           message: "{{ message }}"
      #           data:
      #             tag: "{{ tag }}"
      #             actions: "{{ actions | default([], true) }}"
      - choose: []
        default: []

      # Spoken announcement. `continue_on_error` so an unplugged speaker can
      # never swallow the notification that already went out above.
      - if:
          - condition: state
            entity_id: input_boolean.bbq_tts_alerts
            state: "on"
          # No native condition tests "this text helper is non-empty".
          - condition: template
            value_template: >
              {{ states('input_text.bbq_tts_speaker') not in ['', 'unknown', 'unavailable']
                 and states('input_text.bbq_tts_engine') not in ['', 'unknown', 'unavailable'] }}
        then:
          - action: tts.speak
            continue_on_error: true
            target:
              entity_id: "{{ states('input_text.bbq_tts_engine') }}"
            data:
              media_player_entity_id: "{{ states('input_text.bbq_tts_speaker') }}"
              cache: true
              message: "{{ tts_message | default(message, true) }}"

automation:
  # --------------------------------------------------------------------------
  #  Probe reached its target.
  # --------------------------------------------------------------------------
  - id: inkbird_bbq_probe_reached_target
    alias: BBQ probe reached target
    description: Notifies when a BBQ probe reaches its target temperature.
    triggers:
      - trigger: state
        entity_id: sensor.bbq_probe_1_status
        to: ready
        id: "1"
      - trigger: state
        entity_id: sensor.bbq_probe_2_status
        to: ready
        id: "2"
      - trigger: state
        entity_id: sensor.bbq_probe_3_status
        to: ready
        id: "3"
      - trigger: state
        entity_id: sensor.bbq_probe_4_status
        to: ready
        id: "4"
    actions:
      - variables:
          prefix: >
            {% set p = states('input_text.inkbird_sensor_prefix') %}
            {{ p if p not in ['unknown', 'unavailable', ''] else 'sensor.overig_inkbird_int_14' }}
          idx: "{{ trigger.id }}"
          snooze: "{{ states('input_number.bbq_snooze_minutes') | int(10) }}"
          pname: "{{ states('input_text.inkbird_name_' ~ trigger.id) }}"
          ptemp: "{{ states(prefix ~ '_probe_' ~ trigger.id ~ '_food_1_temperature') | round(1) }}"
          ptarget: "{{ states('input_number.inkbird_target_' ~ trigger.id) | round(0) }}"
      - action: script.bbq_notify
        data:
          title: "🔥 {{ pname }} is ready"
          message: "Probe {{ idx }} reached its target of {{ ptarget }}°C (now {{ ptemp }}°C)."
          tts_message: "Your {{ pname }} is ready. It has reached {{ ptemp }} degrees."
          tag: "inkbird_ready_{{ idx }}"
          actions:
            - action: "BBQ_SNOOZE_{{ idx }}"
              title: "Snooze {{ snooze }} min"
            - action: "BBQ_DISMISS_{{ idx }}"
              title: Dismiss
    mode: parallel

  # --------------------------------------------------------------------------
  #  Probe battery running out mid-cook.
  # --------------------------------------------------------------------------
  - id: inkbird_bbq_probe_battery_low
    alias: BBQ probe battery low
    description: >
      Warns when a probe battery drops below the threshold set on the
      dashboard's Settings page. Toggled by input_boolean.bbq_battery_alerts.
    triggers:
      - trigger: numeric_state
        entity_id: sensor.overig_inkbird_int_14_probe_1_battery
        below: input_number.bbq_battery_threshold
        id: "1"
      - trigger: numeric_state
        entity_id: sensor.overig_inkbird_int_14_probe_2_battery
        below: input_number.bbq_battery_threshold
        id: "2"
      - trigger: numeric_state
        entity_id: sensor.overig_inkbird_int_14_probe_3_battery
        below: input_number.bbq_battery_threshold
        id: "3"
      - trigger: numeric_state
        entity_id: sensor.overig_inkbird_int_14_probe_4_battery
        below: input_number.bbq_battery_threshold
        id: "4"
    conditions:
      - condition: state
        entity_id: input_boolean.bbq_battery_alerts
        state: "on"
    actions:
      - variables:
          idx: "{{ trigger.id }}"
          pname: "{{ states('input_text.inkbird_name_' ~ trigger.id) }}"
          pct: "{{ trigger.to_state.state }}"
      - action: script.bbq_notify
        data:
          title: "🪫 Probe {{ idx }} battery low"
          message: "{{ pname }} is at {{ pct }}%. Swap or charge the probe before it quits mid-cook."
          tts_message: "Warning. The battery on probe {{ idx }} is at {{ pct }} percent."
          tag: "inkbird_battery_{{ idx }}"
    mode: parallel

  # --------------------------------------------------------------------------
  #  The stall. Classic on brisket and pork butt: evaporative cooling holds the
  #  meat at a plateau for hours. Worth knowing about — it's the moment you
  #  decide whether to wrap.
  # --------------------------------------------------------------------------
  - id: inkbird_bbq_probe_stalled
    alias: BBQ probe stalled
    description: >
      Fires when a probe's rate of change sits between -1 and +1 °C/h for 45
      minutes while still below target. Toggled by input_boolean.bbq_stall_alerts.
    triggers:
      - trigger: numeric_state
        entity_id: sensor.bbq_probe_1_rate
        above: -1
        below: 1
        for: "00:45:00"
        id: "1"
      - trigger: numeric_state
        entity_id: sensor.bbq_probe_2_rate
        above: -1
        below: 1
        for: "00:45:00"
        id: "2"
      - trigger: numeric_state
        entity_id: sensor.bbq_probe_3_rate
        above: -1
        below: 1
        for: "00:45:00"
        id: "3"
      - trigger: numeric_state
        entity_id: sensor.bbq_probe_4_rate
        above: -1
        below: 1
        for: "00:45:00"
        id: "4"
    conditions:
      - condition: state
        entity_id: input_boolean.bbq_stall_alerts
        state: "on"
      # Only interesting while still climbing towards the target — a probe
      # sitting on the counter is also flat, and so is one that is already done.
      - condition: template
        value_template: "{{ is_state('sensor.bbq_probe_' ~ trigger.id ~ '_status', 'heating') }}"
    actions:
      - variables:
          prefix: >
            {% set p = states('input_text.inkbird_sensor_prefix') %}
            {{ p if p not in ['unknown', 'unavailable', ''] else 'sensor.overig_inkbird_int_14' }}
          idx: "{{ trigger.id }}"
          pname: "{{ states('input_text.inkbird_name_' ~ trigger.id) }}"
          ptemp: "{{ states(prefix ~ '_probe_' ~ trigger.id ~ '_food_1_temperature') | round(1) }}"
          ptarget: "{{ states('input_number.inkbird_target_' ~ trigger.id) | round(0) }}"
      - action: script.bbq_notify
        data:
          title: "😐 {{ pname }} has stalled"
          message: "Probe {{ idx }} has been flat at {{ ptemp }}°C for 45 minutes (target {{ ptarget }}°C). Time to wrap?"
          tts_message: "{{ pname }} has stalled at {{ ptemp }} degrees. You may want to wrap it."
          tag: "inkbird_stall_{{ idx }}"
    mode: parallel

  # --------------------------------------------------------------------------
  #  Handles the buttons on the phone notification.
  # --------------------------------------------------------------------------
  - id: inkbird_bbq_notification_action
    alias: BBQ notification action
    description: Handles the Snooze / Dismiss buttons on a BBQ notification.
    triggers:
      - trigger: event
        event_type: mobile_app_notification_action
    conditions:
      # No native condition matches a string prefix, so this one is a template
      # on purpose. It also guards against actions from other integrations.
      - condition: template
        value_template: >
          {{ trigger.event.data.action is string
             and trigger.event.data.action.startswith('BBQ_') }}
    actions:
      - variables:
          prefix: >
            {% set p = states('input_text.inkbird_sensor_prefix') %}
            {{ p if p not in ['unknown', 'unavailable', ''] else 'sensor.overig_inkbird_int_14' }}
          parts: "{{ trigger.event.data.action.split('_') }}"
          kind: "{{ parts[1] }}"
          idx: "{{ parts[2] }}"
      - action: persistent_notification.dismiss
        data:
          notification_id: "inkbird_ready_{{ idx }}"
      - choose:
          - conditions: "{{ kind == 'SNOOZE' }}"
            sequence:
              - delay:
                  minutes: "{{ states('input_number.bbq_snooze_minutes') | int(10) }}"
              # Nothing to say if it was taken off the grill in the meantime.
              - condition: template
                value_template: "{{ is_state('sensor.bbq_probe_' ~ idx ~ '_status', 'ready') }}"
              - variables:
                  snooze: "{{ states('input_number.bbq_snooze_minutes') | int(10) }}"
                  pname: "{{ states('input_text.inkbird_name_' ~ idx) }}"
                  ptemp: "{{ states(prefix ~ '_probe_' ~ idx ~ '_food_1_temperature') | round(1) }}"
              - action: script.bbq_notify
                data:
                  title: "🔥 {{ pname }} is still ready"
                  message: "Snoozed {{ snooze }} minutes ago. Probe {{ idx }} is at {{ ptemp }}°C."
                  tts_message: "Reminder. {{ pname }} is still waiting at {{ ptemp }} degrees."
                  tag: "inkbird_ready_{{ idx }}"
                  actions:
                    - action: "BBQ_SNOOZE_{{ idx }}"
                      title: "Snooze {{ snooze }} min"
                    - action: "BBQ_DISMISS_{{ idx }}"
                      title: Dismiss
        default: []
    mode: parallel
    max: 20
