button_card_templates:
  inkbird_probe:
    show_name: false
    show_icon: false
    show_label: false
    tap_action:
      action: none
    styles:
      card:
      - padding: 18px
      - border-radius: 18px
      - border: 1px solid "#3a2f27"
      - border-top: |
          [[[
            var s = states[variables.pstate].state;
            var c = s==='ready' ? '#56c271' : s==='close' ? '#ff6a2c' : s==='heating' ? '#f2b441' : '#77695c';
            return '3px solid ' + c;
          ]]]
      - background: linear-gradient(180deg,#211b16,#2b231d)
      - box-shadow: 0 18px 40px -18px rgba(0,0,0,.7)
      grid:
      - grid-template-areas: '"header header header header" "fig gauge side side" "fig gauge minus plus"'
      - grid-template-columns: 34px 128px 1fr 1fr
      - grid-template-rows: auto 1fr auto
      - gap: 10px 12px
      - align-items: center
      custom_fields:
        header:
        - justify-self: stretch
        fig:
        - align-self: stretch
        side:
        - justify-self: stretch
        minus:
        - justify-self: stretch
        plus:
        - justify-self: stretch
    custom_fields:
      header: |
        [[[
          var s = states[variables.pstate].state;
          var name = states[variables.pname].state;
          var col = s==='ready' ? '#56c271' : s==='close' ? '#ff6a2c' : s==='heating' ? '#f2b441' : '#77695c';
          var label = s==='ready' ? 'Ready' : s==='close' ? 'Almost there' : s==='heating' ? 'Heating' : 'Not connected';
          return `<div style="display:flex;align-items:center;gap:11px;font-family:system-ui">
            <div style="width:30px;height:30px;border-radius:9px;display:grid;place-items:center;
                 font-family:ui-monospace,monospace;font-weight:700;background:#33291f;
                 border:1px solid #4d3f33;color:#f5ede4">P${variables.num}</div>
            <div style="flex:1;font-weight:620;font-size:1rem;color:#f5ede4">${name}
              <div style="font-size:.74rem;color:#a89a8c;font-weight:500">Probe ${variables.num}</div></div>
            <div style="font-size:.72rem;font-weight:600;letter-spacing:.04em;text-transform:uppercase;
                 padding:5px 11px;border-radius:999px;color:${col};
                 background:${col}26;border:1px solid ${col}66">${label}</div>
          </div>`;
        ]]]
      fig: |
        [[[
          var s = states[variables.pstate].state;
          var connected = s !== 'idle';
          var col = s==='ready' ? '#56c271' : s==='close' ? '#ff6a2c' : s==='heating' ? '#f2b441' : '#77695c';
          var tip = connected ? col : '#77695c';
          var glow = connected ? `filter:drop-shadow(0 0 4px ${col})` : '';
          return `<svg viewBox="0 0 26 150" style="height:148px;width:auto;display:block;margin:auto">
            <defs>
              <linearGradient id="st${variables.num}" x1="0" x2="1" y1="0" y2="0">
                <stop offset="0" stop-color="#6c7075"/><stop offset=".28" stop-color="#eef1f3"/>
                <stop offset=".5" stop-color="#c4c9ce"/><stop offset=".72" stop-color="#eef1f3"/>
                <stop offset="1" stop-color="#5c6065"/></linearGradient>
              <linearGradient id="gl${variables.num}" x1="0" x2="1" y1="0" y2="0">
                <stop offset="0" stop-color="#0c0c0e"/><stop offset=".3" stop-color="#3a3a40"/>
                <stop offset=".5" stop-color="#141418"/><stop offset=".75" stop-color="#2a2a30"/>
                <stop offset="1" stop-color="#050506"/></linearGradient>
              <linearGradient id="rg${variables.num}" x1="0" x2="1" y1="0" y2="0">
                <stop offset="0" stop-color="#8a8e93"/><stop offset=".5" stop-color="#f2f4f6"/>
                <stop offset="1" stop-color="#7a7e83"/></linearGradient>
            </defs>
            <ellipse cx="13" cy="6" rx="7.5" ry="2.6" fill="url(#rg${variables.num})"/>
            <path d="M5.5 6 L20.5 6 L17 52 L9 52 Z" fill="url(#gl${variables.num})" stroke="#000" stroke-width=".6"/>
            <text x="13" y="30" text-anchor="middle" font-family="ui-monospace,monospace"
                  font-weight="700" font-size="10" fill="${connected?'#f0f0f2':'#8a8a8c'}">${variables.num}</text>
            <rect x="8.5" y="52" width="9" height="4" rx="1" fill="url(#rg${variables.num})"/>
            <rect x="10" y="56" width="6" height="82" fill="url(#st${variables.num})"/>
            <path d="M10 138 L16 138 L13 150 Z" fill="${tip}" style="${glow}"/>
          </svg>`;
        ]]]
      gauge: |
        [[[
          var t = parseFloat(states[variables.probe].state);
          var g = parseFloat(states[variables.target].state);
          var s = states[variables.pstate].state;
          var amb = 22, connected = !isNaN(t);
          var col = s==='ready' ? '#56c271' : s==='close' ? '#ff6a2c' : s==='heating' ? '#f2b441' : '#77695c';
          var pct = connected ? Math.max(0, Math.min(1,(t-amb)/(g-amb))) : 0;
          var R=52, C=2*Math.PI*R, ARC=0.75;
          var dash=(C*ARC*pct).toFixed(1)+' '+C;
          var uf = states['input_select.inkbird_unit'].state.indexOf('F') >= 0;
          var us = uf ? '°F' : '°C';
          var cv = function(c){ return uf ? Math.round(c*9/5+32) : Math.round(c*10)/10; };
          var temp = connected ? cv(t) : '—';
          return `<div style="position:relative;width:128px;height:128px;margin:auto">
            <svg width="128" height="128" viewBox="0 0 128 128" style="transform:rotate(135deg)">
              <circle cx="64" cy="64" r="${R}" fill="none" stroke="#33291f" stroke-width="9"
                stroke-linecap="round" stroke-dasharray="${(C*ARC).toFixed(1)} ${C}"/>
              <circle cx="64" cy="64" r="${R}" fill="none" stroke="${col}" stroke-width="9"
                stroke-linecap="round" stroke-dasharray="${dash}"
                style="transition:stroke-dasharray .6s ease,stroke .4s"/>
            </svg>
            <div style="position:absolute;inset:0;display:flex;flex-direction:column;
                 align-items:center;justify-content:center;font-family:ui-monospace,monospace">
              <div style="font-size:1.7rem;font-weight:650;color:#f5ede4;line-height:1">${temp}<span style="font-size:.9rem;color:#a89a8c">${us}</span></div>
              <div style="font-size:.72rem;color:#77695c;margin-top:2px">${connected?'target '+cv(g)+'°':'no probe'}</div>
            </div>
          </div>`;
        ]]]
      side: |
        [[[
          var t = parseFloat(states[variables.probe].state);
          var g = parseFloat(states[variables.target].state);
          var s = states[variables.pstate].state;
          var connected = !isNaN(t);
          var uf = states['input_select.inkbird_unit'].state.indexOf('F') >= 0;
          var us = uf ? '\u00b0F' : '\u00b0C';
          var cv = function(c){ return uf ? Math.round(c*9/5+32) : Math.round(c*10)/10; };
          var togo = uf ? Math.round((g-t)*9/5) : Math.round((g-t)*10)/10;
          var footer = !connected ? 'Insert a probe to begin'
            : (s==='ready' ? 'Reached target \u2014 resting'
            : Math.max(0, togo) + '\u00b0 to go');
          var bs = states[variables.pbatt];
          var bv = bs ? parseInt(bs.state) : NaN;
          var bok = !isNaN(bv);
          var bcol = !bok ? '#77695c' : bv < 20 ? '#e8503a' : bv < 40 ? '#f2b441' : '#56c271';
          return `<div style="display:flex;flex-direction:column;gap:10px;font-family:system-ui">
            <div style="display:flex;align-items:center;gap:10px">
              <span style="flex:1;font-size:.72rem;text-transform:uppercase;letter-spacing:.12em;color:#77695c">Target</span>
              <span style="font-family:ui-monospace,monospace;font-weight:600;font-size:1.05rem;color:#f5ede4">${cv(g)}${us}</span>
            </div>
            <div style="display:flex;align-items:center;gap:8px" title="probe battery">
              <span style="flex:1;font-size:.72rem;text-transform:uppercase;letter-spacing:.12em;color:#77695c">Battery</span>
              <span style="width:26px;height:12px;border:1.5px solid #77695c;border-radius:3px;padding:1.5px;
                display:inline-block;position:relative">
                <span style="display:block;height:100%;width:${bok?bv:0}%;background:${bcol};border-radius:1px"></span>
              </span>
              <span style="font-family:ui-monospace,monospace;font-size:.82rem;font-weight:600;color:${bcol};
                min-width:34px;text-align:right">${bok?bv+'%':'\u2014'}</span>
            </div>
            <div style="font-size:.78rem;color:#a89a8c">${footer}</div>
          </div>`;
        ]]]
      minus:
        card:
          type: custom:button-card
          name: −
          tap_action:
            action: call-service
            service: input_number.decrement
            target:
              entity_id: '[[[ return variables.target ]]]'
          styles:
            card:
            - height: 40px
            - border-radius: 10px
            - border: 1px solid "#4d3f33"
            - background: '#33291f'
            - color: '#f5ede4'
            - font-size: 1.3rem
      plus:
        card:
          type: custom:button-card
          name: +
          tap_action:
            action: call-service
            service: input_number.increment
            target:
              entity_id: '[[[ return variables.target ]]]'
          styles:
            card:
            - height: 40px
            - border-radius: 10px
            - border: 1px solid "#4d3f33"
            - background: '#33291f'
            - color: '#ff6a2c'
            - font-size: 1.3rem
  inkbird_recipe:
    show_icon: true
    icon: mdi:silverware-fork-knife
    styles:
      card:
      - padding: 14px
      - border-radius: 14px
      - border: 1px solid "#3a2f27"
      - background: '#211b16'
      grid:
      - grid-template-areas: '"i" "n" "t" "s"'
      - grid-template-rows: auto auto auto auto
      - gap: 6px
      - justify-items: start
      icon:
      - color: '[[[ return variables.color ]]]'
      - width: 30px
      name:
      - color: '#f5ede4'
      - font-weight: 620
      - font-size: .92rem
      - justify-self: start
      custom_fields:
        t:
        - justify-self: start
        s:
        - justify-self: start
    custom_fields:
      t: |
        [[[ return `<div style="font-family:ui-monospace,monospace;font-weight:650;font-size:1.15rem;color:#ff6a2c">${variables.temp}<span style="font-size:.74rem;color:#a89a8c">°C</span></div>`; ]]]
      s: |
        [[[ return `<div style="font-size:.74rem;color:#a89a8c">${variables.note}</div>`; ]]]
    tap_action:
      action: call-service
      service: script.inkbird_apply_recipe
      data:
        label: '[[[ return variables.rname ]]]'
        target: '[[[ return variables.temp ]]]'
title: Cook Control
views:
- title: Cook Control
  path: cook
  icon: mdi:grill
  background: '#16120f'
  cards:
  - type: vertical-stack
    card_mod:
      style: |
        :host { max-width: 1220px; margin: 0 auto; display:block; }
    cards:
    - type: custom:button-card
      tap_action:
        action: none
      styles:
        card:
        - background: none
        - border: none
        - box-shadow: none
        - padding: 6px 6px 0
        grid:
        - grid-template-areas: '"mark title status"'
        - grid-template-columns: auto 1fr auto
        - align-items: center
        - gap: 14px
        custom_fields:
          title:
          - justify-self: start
          status:
          - justify-self: end
      custom_fields:
        mark: |
          [[[ return `<div style="width:46px;height:46px;border-radius:13px;
            display:grid;place-items:center;
            background:linear-gradient(150deg,#ff8a3d,#ff6a2c);
            box-shadow:0 6px 18px -6px #ff6a2c,inset 0 1px 0 rgba(255,255,255,.35)">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#fff"
              stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 3c1.5 2.5.5 4-.7 5.4C10 10 9 11.4 9 13.2A3 3 0 0 0 15 13.2c0-1.2-.5-2-1-2.8"/>
              <path d="M12 21a5 5 0 0 0 5-5c0-1.6-.7-2.7-1.5-3.7"/></svg></div>`; ]]]
        title: |
          [[[ return `<div style="font-family:system-ui;text-align:left">
            <div style="font-size:1.16rem;font-weight:650;color:#f5ede4;letter-spacing:-.01em">Cook Control</div>
            <div style="font-size:.74rem;color:#a89a8c;letter-spacing:.14em;text-transform:uppercase">Inkbird INT-14 (INT-14S-BW)</div>
          </div>`; ]]]
        status: |
          [[[
            var tr = states['sensor.inkbird_int_14_active_transport'];
            var bc = states['binary_sensor.inkbird_int_14_ble_connected'];
            var t  = tr ? tr.state : 'unknown';
            var map = {
              ble:        ['Bluetooth', 'live'],
              ble_waiting:['Bluetooth', 'wait'],
              wifi:       ['Wi-Fi',     'live'],
              wi_fi:      ['Wi-Fi',     'live'],
              local_lan:  ['LAN',       'live'],
              lan:        ['LAN',       'live'],
              cloud:      ['Cloud',     'live'],
              none:       ['no link',   'down'],
              unknown:    ['no link',   'down'],
              unavailable:['no link',   'down']
            };
            var m = map[t] || [t.replace(/_/g,' '), 'live'];
            var how = m[0], mode = m[1];
            if (mode === 'live' && t.indexOf('ble') === 0 && !(bc && bc.state === 'on')) mode = 'wait';
            var col  = mode === 'live' ? '#56c271' : mode === 'wait' ? '#f2b441' : '#e8503a';
            var word = mode === 'live' ? 'Live'    : mode === 'wait' ? 'Connecting' : 'Offline';
            var pulse = mode === 'wait' ? 'animation:inkbird-pulse 1.4s ease-in-out infinite' : '';
            var b = states['sensor.overig_inkbird_int_14_base_battery'].state;
            b = (b === undefined || b === 'unknown' || b === 'unavailable') ? '\u2014' : b + '%';
            return `<style>@keyframes inkbird-pulse{0%,100%{opacity:1}50%{opacity:.25}}</style>
            <div style="display:flex;gap:10px;align-items:center;font-family:system-ui">
              <span title="active transport: ${t}"
                style="display:inline-flex;align-items:center;gap:8px;background:#211b16;
                border:1px solid #3a2f27;padding:8px 13px;border-radius:999px;font-size:.82rem;color:#a89a8c">
                <span style="width:8px;height:8px;border-radius:50%;background:${col};${pulse}"></span>
                ${word} \u00b7 <b style="color:#f5ede4">${how}</b></span>
              <span style="background:#211b16;border:1px solid #3a2f27;padding:8px 13px;
                border-radius:999px;font-size:.82rem;color:#a89a8c">Base battery
                <b style="color:#f5ede4">${b}</b></span>
            </div>`;
          ]]]
    - type: markdown
      content: |
        {% set ns = namespace(rows=[]) %}
        {% for i in range(1,5) %}
          {% set s = states('sensor.bbq_probe_' ~ i ~ '_status') %}
          {% set n = states('input_text.inkbird_name_' ~ i) %}
          {% set g = states('input_number.inkbird_target_' ~ i) | int %}
          {% if s == 'ready' %}
            {% set ns.rows = ns.rows + ['🟢 **' ~ n ~ '** reached ' ~ g ~ '°C — ready'] %}
          {% elif s == 'close' %}
            {% set ns.rows = ns.rows + ['🟡 **' ~ n ~ '** almost there (target ' ~ g ~ '°C)'] %}
          {% endif %}
        {% endfor %}
        ### Alerts
        {% if ns.rows | length == 0 %}
        _No alerts. Everything's on track._
        {% else %}
        {% for r in ns.rows %}- {{ r }}
        {% endfor %}
        {% endif %}
      card_mod:
        style: |
          ha-card {
            background: linear-gradient(180deg,#211b16,#2b231d);
            border:1px solid #3a2f27; border-radius:18px; color:#f5ede4;
          }
    - type: custom:button-card
      icon: mdi:cog-outline
      show_name: true
      show_icon: true
      name: Settings
      size: 22px
      styles:
        card:
        - background: '#211b16'
        - border: '1px solid #3a2f27'
        - border-radius: 14px
        - padding: 10px 16px
        - justify-self: end
        - width: 150px
        name:
        - font-size: .82rem
        - color: '#a89a8c'
        icon:
        - color: '#a89a8c'
      tap_action:
        action: navigate
        navigation_path: /dashboard-bbq/settings
    - type: custom:button-card
      tap_action:
        action: none
      styles:
        card:
        - background: linear-gradient(180deg,#211b16,#2b231d)
        - border: 1px solid "#3a2f27"
        - border-radius: 18px
        - padding: 20px 24px
        - box-shadow: 0 18px 40px -18px rgba(0,0,0,.7)
        grid:
        - grid-template-areas: '"dev meta batt"'
        - grid-template-columns: auto 1fr auto
        - align-items: center
        - gap: 26px
        custom_fields:
          meta:
          - justify-self: start
      custom_fields:
        dev: |
          [[[ return `<svg width="172" height="158" viewBox="0 0 172 158" fill="none">
            <rect x="3" y="3" width="166" height="152" rx="24" fill="#0b0b0d" stroke="#c9cdd2" stroke-width="3"/>
            <rect x="9" y="9" width="154" height="140" rx="19" fill="#141416" stroke="#2a2a2e"/>
            <rect x="18" y="20" width="66" height="104" rx="11" fill="#0a0a0c" stroke="#242428"/>
            <g stroke="#c4c9ce" stroke-width="3">
              <line x1="30" y1="30" x2="30" y2="118"/><line x1="44" y1="30" x2="44" y2="118"/>
              <line x1="58" y1="30" x2="58" y2="118"/><line x1="72" y1="30" x2="72" y2="118"/></g>
            <g font-family="ui-monospace,monospace" font-size="7" fill="#e8e8ea" text-anchor="middle">
              <text x="30" y="40">1</text><text x="44" y="40">2</text><text x="58" y="40">3</text><text x="72" y="40">4</text></g>
            <rect x="92" y="20" width="62" height="94" rx="10" fill="#050506" stroke="#242428"/>
            <g font-family="ui-monospace,monospace" font-weight="700" fill="#f4f4f6">
              <text x="98" y="46" font-size="12">63</text><text x="98" y="63" font-size="12">57</text>
              <text x="98" y="80" font-size="12">41</text><text x="98" y="97" font-size="11" fill="#55555a">---</text></g>
            <text x="123" y="128" font-family="system-ui" font-weight="700" font-size="9" fill="#c9cdd2" text-anchor="middle" letter-spacing="1.5">INKBIRD</text>
            <circle cx="63" cy="136" r="10" fill="#0a0a0c" stroke="#c9cdd2" stroke-width="1.5"/>
            <circle cx="63" cy="136" r="6" fill="#1a1a1e"/></svg>`; ]]]
        meta: |
          [[[
            var b = states['sensor.overig_inkbird_int_14_base_battery'].state;
            b = (b === undefined || b === 'unknown' || b === 'unavailable') ? '—' : b + '%';
            return `<div style="font-family:system-ui">
              <div style="font-size:.72rem;text-transform:uppercase;letter-spacing:.16em;color:#77695c">Base station</div>
              <div style="font-size:1.28rem;font-weight:650;color:#f5ede4;margin:2px 0 10px">INT-14S-BW</div>
              <div style="display:flex;gap:26px">
                <div><div style="font-size:.72rem;text-transform:uppercase;letter-spacing:.12em;color:#77695c">Connection</div>
                  <div style="font-family:ui-monospace,monospace;font-size:1.05rem;font-weight:600;color:#f5ede4">BLE 5.4</div></div>
                <div><div style="font-size:.72rem;text-transform:uppercase;letter-spacing:.12em;color:#77695c">Battery</div>
                  <div style="font-family:ui-monospace,monospace;font-size:1.05rem;font-weight:600;color:#f5ede4">${b}</div></div>
              </div></div>`;
          ]]]
        batt: |
          [[[
            var raw = parseInt(states['sensor.overig_inkbird_int_14_base_battery'].state);
            var pct = isNaN(raw) ? 0 : raw;
            var col = pct < 20 ? '#e8503a' : '#56c271';
            return `<div style="display:flex;align-items:center;gap:9px">
              <div style="width:40px;height:18px;border:2px solid #a89a8c;border-radius:4px;padding:2px;position:relative">
                <div style="height:100%;width:${pct}%;background:${col};border-radius:1px"></div></div>
              <span style="font-family:ui-monospace,monospace;font-weight:600;color:#f5ede4">${isNaN(raw)?'—':pct+'%'}</span>
            </div>`;
          ]]]
    - type: grid
      columns: 2
      square: false
      cards:
      - type: custom:button-card
        template: inkbird_probe
        variables:
          num: 1
          probe: sensor.overig_inkbird_int_14_probe_1_food_1_temperature
          target: input_number.inkbird_target_1
          pname: input_text.inkbird_name_1
          pstate: sensor.bbq_probe_1_status
          pbatt: sensor.overig_inkbird_int_14_probe_1_battery
      - type: custom:button-card
        template: inkbird_probe
        variables:
          num: 2
          probe: sensor.overig_inkbird_int_14_probe_2_food_1_temperature
          target: input_number.inkbird_target_2
          pname: input_text.inkbird_name_2
          pstate: sensor.bbq_probe_2_status
          pbatt: sensor.overig_inkbird_int_14_probe_2_battery
      - type: custom:button-card
        template: inkbird_probe
        variables:
          num: 3
          probe: sensor.overig_inkbird_int_14_probe_3_food_1_temperature
          target: input_number.inkbird_target_3
          pname: input_text.inkbird_name_3
          pstate: sensor.bbq_probe_3_status
          pbatt: sensor.overig_inkbird_int_14_probe_3_battery
      - type: custom:button-card
        template: inkbird_probe
        variables:
          num: 4
          probe: sensor.overig_inkbird_int_14_probe_4_food_1_temperature
          target: input_number.inkbird_target_4
          pname: input_text.inkbird_name_4
          pstate: sensor.bbq_probe_4_status
          pbatt: sensor.overig_inkbird_int_14_probe_4_battery
    - type: markdown
      content: |
        #### Recipe presets — first pick the **Active probe** above, then tap a recipe
      card_mod:
        style: |
          ha-card { background:none;border:none;box-shadow:none;color:#a89a8c; }
    - type: grid
      columns: 6
      square: false
      cards:
      - type: tile
        entity: input_select.inkbird_active_probe
        name: Active probe
        icon: mdi:thermometer-lines
        features:
        - type: select-options
      - type: custom:button-card
        template: inkbird_recipe
        name: Beef Brisket
        variables:
          rname: Beef Brisket
          temp: 93
          note: Low & slow
          color: '#b0442a'
      - type: custom:button-card
        template: inkbird_recipe
        name: Chicken
        variables:
          rname: Chicken
          temp: 74
          note: Food-safe
          color: '#e0a23a'
      - type: custom:button-card
