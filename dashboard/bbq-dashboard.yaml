- title: Settings
  path: settings
  icon: mdi:cog
  type: sections
  max_columns: 3
  background: '#16120f'
  header:
    layout: responsive
    card:
      type: markdown
      text_only: true
      content: |
        {% set model = states('sensor.inkbird_int_14_configured_model') %}{% set probes = states('sensor.inkbird_int_14_physical_probe_count') %}{% set tr = states('sensor.inkbird_int_14_active_transport') %}{% set ble = is_state('binary_sensor.inkbird_int_14_ble_connected','on') %}{% set bb = states('sensor.overig_inkbird_int_14_base_battery') %}{% set upd = states('update.inkbird_int_update') %}
        ## ⚙️ Settings
        **{{ model }}** · {{ probes }} probes · base battery **{{ bb }}%**

        {{ '🟢 Connected' if ble else '🟠 ' ~ tr }} · {{ '🔷 Integration update available' if upd == 'on' else '✅ Integration up to date' }}
